# openapi: 3.1 — Nam Viet Backend API (sinh tự động, đừng sửa tay)
components:
  schemas:
    AllocationLineDTO:
      additionalProperties: false
      properties:
        amount:
          description: Số tiền phân bổ cho đơn (chuỗi thập phân)
          type: string
        order_code:
          type: string
        order_id:
          type: string
      required:
        - order_id
        - order_code
        - amount
      type: object
    B2bDTO:
      additionalProperties: false
      properties:
        debt_limit:
          description: Hạn mức công nợ (chỉ hiển thị, KHÔNG enforce — credit-limit đang OFF)
          type: string
        payment_term:
          description: Kỳ hạn thanh toán (số ngày); 0 = không khai
          format: int64
          type: integer
        sales_staff_id:
          description: Nhân viên phụ trách (uuid); rỗng = chưa gán
          type: string
        tax_code:
          description: Mã số thuế (MST)
          type: string
      required:
        - tax_code
        - debt_limit
        - payment_term
        - sales_staff_id
      type: object
    BatchDTO:
      additionalProperties: false
      properties:
        batch_code:
          type: string
        batch_id:
          format: int64
          type: integer
        expiry_date:
          description: Hạn dùng (YYYY-MM-DD)
          type: string
        inbound_price:
          description: Giá vốn nhập của lô (chuỗi thập phân)
          type: string
        inventory_batch_id:
          format: int64
          type: integer
        manufacturing_date:
          description: Ngày sản xuất (YYYY-MM-DD); rỗng nếu không có
          type: string
        product_id:
          format: int64
          type: integer
        quantity:
          description: Tồn của lô (chuỗi thập phân, không float)
          type: string
        warehouse_id:
          format: int64
          type: integer
      required:
        - inventory_batch_id
        - warehouse_id
        - product_id
        - batch_id
        - batch_code
        - quantity
        - expiry_date
        - manufacturing_date
        - inbound_price
      type: object
    CategoryDTO:
      additionalProperties: false
      properties:
        id:
          format: int64
          type: integer
        name:
          type: string
        parent_id:
          format: int64
          type:
            - integer
            - "null"
        slug:
          type: string
        status:
          type: string
      required:
        - id
        - name
        - slug
        - parent_id
        - status
      type: object
    CodeError:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/CodeErrorDataStruct"
        error:
          $ref: "#/components/schemas/ErrBody"
      required:
        - data
        - error
      type: object
    CodeErrorDataStruct:
      additionalProperties: false
      type: object
    ConfirmReceiptOutputBody:
      additionalProperties: false
      properties:
        confirmed:
          description: true = vừa xác nhận vào quỹ (pending→completed); false = đã completed trước đó (idempotent)
          type: boolean
      required:
        - confirmed
      type: object
    ConsumedBatchDTO:
      additionalProperties: false
      properties:
        batch_id:
          format: int64
          type: integer
        inbound_price:
          description: Giá vốn nhập per-unit của lô (chuỗi thập phân)
          type: string
        inventory_batch_id:
          format: int64
          type: integer
        quantity:
          description: Số lượng trừ từ lô (chuỗi thập phân)
          type: string
      required:
        - batch_id
        - inventory_batch_id
        - quantity
        - inbound_price
      type: object
    CreateOrderInputBody:
      additionalProperties: false
      properties:
        creator_id:
          description: Người lập (uuid); bỏ trống nếu không có
          type: string
        customer_id:
          description: ID khách (bigint); bỏ trống nếu đơn không gắn khách (POS B2C)
          format: int64
          type: integer
        lines:
          description: Các dòng hàng (ít nhất 1)
          items:
            $ref: "#/components/schemas/CreateOrderLineDTO"
          minItems: 1
          type:
            - array
            - "null"
        note:
          type: string
        order_type:
          description: Loại đơn; bỏ trống = B2C
          enum:
            - B2B
            - B2C
          type: string
      required:
        - lines
      type: object
    CreateOrderLineDTO:
      additionalProperties: false
      properties:
        discount:
          description: Chiết khấu dòng (chuỗi thập phân; bỏ trống = 0)
          type: string
        product_id:
          description: ID sản phẩm (bigint)
          format: int64
          minimum: 1
          type: integer
        quantity:
          description: Số lượng (số nguyên dương)
          format: int64
          minimum: 1
          type: integer
        unit_price:
          description: Đơn giá bán (chuỗi thập phân, không float)
          type: string
        uom:
          description: Đơn vị tính (VD Hộp/Vỉ/Cái)
          minLength: 1
          type: string
      required:
        - product_id
        - quantity
        - uom
        - unit_price
      type: object
    CustomerDTO:
      additionalProperties: false
      properties:
        address:
          type: string
        b2b:
          $ref: "#/components/schemas/B2bDTO"
          description: Hồ sơ doanh nghiệp; null nếu khách B2C
        customer_code:
          type: string
        customer_type:
          description: B2C | B2B
          type: string
        debt:
          $ref: "#/components/schemas/DebtDTO"
        email:
          type: string
        id:
          format: int64
          type: integer
        name:
          type: string
        phone:
          type: string
        status:
          type: string
      required:
        - id
        - customer_code
        - name
        - customer_type
        - phone
        - email
        - address
        - status
        - debt
        - b2b
      type: object
    DebtDTO:
      additionalProperties: false
      properties:
        amount:
          description: Công nợ dùng để hiển thị (chuỗi thập phân, không float)
          type: string
        live:
          description: Công nợ tính LIVE từ đơn chưa tất toán
          type: string
        source:
          description: "Nguồn của amount: live | static"
          type: string
        static:
          description: Công nợ cột tĩnh customers.current_debt (stale)
          type: string
      required:
        - amount
        - live
        - static
        - source
      type: object
    EchoInputBody:
      additionalProperties: false
      properties:
        name:
          description: Tên (bắt buộc, không rỗng)
          minLength: 1
          type: string
      required:
        - name
      type: object
    EchoOutputBody:
      additionalProperties: false
      properties:
        echo:
          description: Phản hồi lại name đã gửi
          type: string
      required:
        - echo
      type: object
    EntryDTO:
      additionalProperties: false
      properties:
        book:
          description: "Sổ kế toán: INTERNAL (thực tế) hoặc TAX (thuế)"
          type: string
        created_at:
          description: Thời điểm tạo (RFC3339)
          type: string
        entry_date:
          description: Ngày ghi sổ (YYYY-MM-DD)
          type: string
        id:
          type: string
        memo:
          type: string
        period_id:
          type: string
        source_id:
          type: string
        source_type:
          type: string
      required:
        - id
        - book
        - entry_date
        - period_id
        - source_type
        - source_id
        - memo
        - created_at
      type: object
    EntryDetailDTO:
      additionalProperties: false
      properties:
        lines:
          items:
            $ref: "#/components/schemas/LineDTO"
          type:
            - array
            - "null"
      required:
        - lines
      type: object
    ErrBody:
      additionalProperties: false
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - code
        - message
      type: object
    FinancePaymentDTO:
      additionalProperties: false
      properties:
        amount:
          description: Số tiền thu (chuỗi thập phân)
          type: string
        book_type:
          description: INTERNAL|TAX|BOTH
          type: string
        code:
          type: string
        id:
          format: int64
          type: integer
        status:
          description: pending|completed...
          type: string
      required:
        - id
        - code
        - amount
        - status
        - book_type
      type: object
    FinanceTransactionDTO:
      additionalProperties: false
      properties:
        amount:
          description: Số tiền (chuỗi thập phân, không float)
          type: string
        bank_reference_id:
          type: string
        book_type:
          description: INTERNAL | TAX | BOTH
          type: string
        business_type:
          type: string
        code:
          type: string
        description:
          type: string
        flow:
          description: "Dòng tiền: 'in' (thu) | 'out' (chi)"
          type: string
        fund_account_id:
          format: int64
          type: integer
        id:
          format: int64
          type: integer
        ref_id:
          description: = orders.code khi ref_type='order'
          type: string
        ref_type:
          type: string
        status:
          description: "'completed' = đã thực vào quỹ"
          type: string
      required:
        - id
        - code
        - flow
        - business_type
        - amount
        - fund_account_id
        - ref_type
        - ref_id
        - status
        - book_type
      type: object
    GetCustomerOutputBody:
      additionalProperties: false
      properties:
        customer:
          $ref: "#/components/schemas/CustomerDTO"
      required:
        - customer
      type: object
    GetOrderOutputBody:
      additionalProperties: false
      properties:
        lines:
          items:
            $ref: "#/components/schemas/OrderLineDTO"
          type:
            - array
            - "null"
        order:
          $ref: "#/components/schemas/OrderDTO"
      required:
        - order
        - lines
      type: object
    GetProductOutputBody:
      additionalProperties: false
      properties:
        product:
          $ref: "#/components/schemas/ProductDTO"
        units:
          items:
            $ref: "#/components/schemas/UnitDTO"
          type:
            - array
            - "null"
      required:
        - product
        - units
      type: object
    HealthStatus:
      additionalProperties: false
      properties:
        status:
          description: Trạng thái dịch vụ
          examples:
            - ok
          type: string
      required:
        - status
      type: object
    InvoiceSummaryDTO:
      additionalProperties: false
      properties:
        id:
          type: string
        invoice_no:
          description: Số HĐ (gapless theo serial)
          format: int64
          type: integer
        serial:
          description: Ký hiệu HĐ
          type: string
        status:
          description: draft|issued|cancelled
          type: string
        subtotal:
          description: Tiền hàng chưa VAT (chuỗi thập phân)
          type: string
        total:
          description: Tổng tiền HĐ (chuỗi thập phân)
          type: string
        vat_amount:
          description: Tiền VAT (chuỗi thập phân)
          type: string
      required:
        - id
        - serial
        - invoice_no
        - subtotal
        - vat_amount
        - total
        - status
      type: object
    LineDTO:
      additionalProperties: false
      properties:
        account_code:
          type: string
        credit:
          description: Số tiền ghi CÓ (chuỗi thập phân, không float)
          type: string
        debit:
          description: Số tiền ghi NỢ (chuỗi thập phân, không float)
          type: string
      required:
        - account_code
        - debit
        - credit
      type: object
    ListBatchesOutputBody:
      additionalProperties: false
      properties:
        items:
          description: Danh sách lô còn tồn, sắp FEFO (hạn dùng tăng dần)
          items:
            $ref: "#/components/schemas/BatchDTO"
          type:
            - array
            - "null"
      required:
        - items
      type: object
    ListCategoriesOutputBody:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/CategoryDTO"
          type:
            - array
            - "null"
      required:
        - items
      type: object
    ListCustomersOutputBody:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/CustomerDTO"
          type:
            - array
            - "null"
        next_cursor:
          description: Con trỏ trang kế; rỗng = hết
          type: string
      required:
        - items
        - next_cursor
      type: object
    ListEntriesOutputBody:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/EntryDTO"
          type:
            - array
            - "null"
        next_cursor:
          description: Con trỏ trang kế; rỗng = hết
          type: string
      required:
        - items
        - next_cursor
      type: object
    ListInvoicesOutputBody:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/VatInvoiceDTO"
          type:
            - array
            - "null"
        next_cursor:
          description: Con trỏ trang kế; rỗng = hết
          type: string
      required:
        - items
        - next_cursor
      type: object
    ListManufacturersOutputBody:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/ManufacturerDTO"
          type:
            - array
            - "null"
      required:
        - items
      type: object
    ListOrdersOutputBody:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/OrderDTO"
          type:
            - array
            - "null"
        next_cursor:
          description: Con trỏ trang kế; rỗng = hết
          type: string
      required:
        - items
        - next_cursor
      type: object
    ListProductsOutputBody:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/ProductDTO"
          type:
            - array
            - "null"
        next_cursor:
          description: Con trỏ trang kế; rỗng = hết
          type: string
      required:
        - items
        - next_cursor
      type: object
    ListStockOutputBody:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/StockDTO"
          type:
            - array
            - "null"
        next_cursor:
          description: Con trỏ trang kế; rỗng = hết
          type: string
      required:
        - items
        - next_cursor
      type: object
    ListTransactionsOutputBody:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/FinanceTransactionDTO"
          type:
            - array
            - "null"
      required:
        - items
      type: object
    ListWarehousesOutputBody:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/WarehouseDTO"
          type:
            - array
            - "null"
      required:
        - items
      type: object
    LoginInputBody:
      additionalProperties: false
      properties:
        email:
          description: Email đăng nhập
          format: email
          type: string
        password:
          description: Mật khẩu
          minLength: 1
          type: string
      required:
        - email
        - password
      type: object
    LogoutInputBody:
      additionalProperties: false
      properties:
        refresh_token:
          description: Refresh token cần thu hồi (cả family)
          minLength: 1
          type: string
      required:
        - refresh_token
      type: object
    LogoutOutputBody:
      additionalProperties: false
      properties:
        status:
          examples:
            - ok
          type: string
      required:
        - status
      type: object
    LumpSumInputBody:
      additionalProperties: false
      properties:
        amount:
          description: Số tiền thu 1 cục (chuỗi thập phân, > 0)
          type: string
        bank_ref:
          type: string
        book_type:
          description: Sổ ghi phiếu; bỏ trống = BOTH
          enum:
            - INTERNAL
            - TAX
            - BOTH
          type: string
        collected:
          description: true = NV đã thu, chưa nộp quỹ (pending); false = vào quỹ ngay
          type: boolean
        created_by:
          type: string
        fund_account_id:
          description: Quỹ/tài khoản nhận tiền
          format: int64
          minimum: 1
          type: integer
        fund_is_bank:
          type: boolean
      required:
        - amount
        - fund_account_id
      type: object
    LumpSumOutputBody:
      additionalProperties: false
      properties:
        allocations:
          description: Phân bổ cho từng đơn (cũ nhất trước)
          items:
            $ref: "#/components/schemas/AllocationLineDTO"
          type:
            - array
            - "null"
        leftover:
          description: Thu thừa chưa phân bổ (credit khách); '0' nếu phân bổ hết
          type: string
        payment:
          $ref: "#/components/schemas/FinancePaymentDTO"
      required:
        - payment
        - allocations
        - leftover
      type: object
    ManufacturerDTO:
      additionalProperties: false
      properties:
        country:
          type: string
        id:
          format: int64
          type: integer
        logo_url:
          type: string
        name:
          type: string
        slug:
          type: string
        status:
          type: string
      required:
        - id
        - name
        - slug
        - country
        - logo_url
        - status
      type: object
    MeOutputBody:
      additionalProperties: false
      properties:
        email:
          type: string
        permissions:
          items:
            type: string
          type:
            - array
            - "null"
        user_id:
          type: string
        user_type:
          type: string
      required:
        - user_id
        - email
        - user_type
        - permissions
      type: object
    OrchVATLineDTO:
      additionalProperties: false
      properties:
        description:
          description: Diễn giải dòng trên HĐ
          type: string
        unit_price:
          description: Đơn giá HĐ (chuỗi; bỏ trống = dùng đơn giá đơn)
          type: string
        vat_rate:
          description: Thuế suất dòng (vd "0.08" = 8%)
          type: string
      required:
        - vat_rate
      type: object
    OrderActionOutputBody:
      additionalProperties: false
      properties:
        order:
          $ref: "#/components/schemas/OrderDTO"
      required:
        - order
      type: object
    OrderDTO:
      additionalProperties: false
      properties:
        code:
          description: Mã hóa đơn (VD HD123)
          type: string
        created_at:
          description: Thời điểm tạo (RFC3339)
          type: string
        creator_id:
          description: Người lập (uuid); rỗng nếu không có
          type: string
        customer_id:
          description: ID khách (bigint); null nếu đơn không gắn khách
          format: int64
          type:
            - integer
            - "null"
        final_amount:
          description: Tổng khách phải trả (chuỗi thập phân)
          type: string
        id:
          description: ID đơn (uuid)
          type: string
        note:
          type: string
        order_type:
          description: B2C | B2B
          type: string
        payment:
          $ref: "#/components/schemas/PaymentDTO"
        payment_status:
          description: unpaid | partial | paid
          type: string
        status:
          description: Trạng thái xử lý đơn
          type: string
        total_amount:
          description: Tổng trước chiết khấu (chuỗi thập phân)
          type: string
      required:
        - id
        - code
        - customer_id
        - creator_id
        - status
        - order_type
        - total_amount
        - final_amount
        - payment_status
        - note
        - created_at
        - payment
      type: object
    OrderDetailOutputBody:
      additionalProperties: false
      properties:
        lines:
          items:
            $ref: "#/components/schemas/OrderLineDTO"
          type:
            - array
            - "null"
        order:
          $ref: "#/components/schemas/OrderDTO"
      required:
        - order
        - lines
      type: object
    OrderLineDTO:
      additionalProperties: false
      properties:
        batch_no:
          description: Lô đã chọn; rỗng nếu chưa gán
          type: string
        discount:
          description: Chiết khấu dòng (chuỗi thập phân)
          type: string
        expiry_date:
          description: Hạn dùng lô (YYYY-MM-DD); rỗng nếu không có
          type: string
        id:
          description: ID dòng (uuid)
          type: string
        is_gift:
          type: boolean
        line_total:
          description: Thành tiền dòng (chuỗi thập phân)
          type: string
        note:
          type: string
        product_id:
          format: int64
          type: integer
        quantity:
          description: Số lượng (chuỗi thập phân, không float)
          type: string
        unit_price:
          description: Đơn giá bán (chuỗi thập phân)
          type: string
        uom:
          description: Đơn vị tính được chọn
          type: string
      required:
        - id
        - product_id
        - quantity
        - uom
        - unit_price
        - discount
        - line_total
        - is_gift
        - batch_no
        - expiry_date
        - note
      type: object
    PaymentDTO:
      additionalProperties: false
      properties:
        final:
          description: Tổng tiền khách phải trả (chuỗi thập phân, không float)
          type: string
        paid:
          description: Đã thu — suy diễn từ finance_transactions (phiếu thu hoàn tất, sổ thực tế)
          type: string
        remaining:
          description: Còn nợ = final - paid (có thể âm nếu thu thừa)
          type: string
      required:
        - final
        - paid
        - remaining
      type: object
    PoActionOutputBody:
      additionalProperties: false
      properties:
        purchase_order:
          $ref: "#/components/schemas/PoDTO"
      required:
        - purchase_order
      type: object
    PoCreateInputBody:
      additionalProperties: false
      properties:
        lines:
          description: Các dòng hàng (ít nhất 1)
          items:
            $ref: "#/components/schemas/PoCreateLineDTO"
          minItems: 1
          type:
            - array
            - "null"
        note:
          type: string
        supplier_id:
          description: ID NCC (bigint, KHÔNG FK); bỏ trống nếu chưa có
          format: int64
          type: integer
        supplier_name:
          description: Tên NCC (lưu thẳng)
          type: string
      required:
        - lines
      type: object
    PoCreateLineDTO:
      additionalProperties: false
      properties:
        batch_code:
          type: string
        expiry_date:
          description: YYYY-MM-DD
          type: string
        manufacturing_date:
          description: YYYY-MM-DD
          type: string
        product_id:
          description: ID sản phẩm (bigint)
          format: int64
          minimum: 1
          type: integer
        quantity:
          description: Số lượng nhập (chuỗi thập phân, > 0)
          type: string
        unit_cost:
          description: Đơn giá nhập per-unit (chuỗi thập phân, >= 0)
          type: string
        vat_rate:
          description: Thuế suất VAT (vd "0.08"; bỏ trống = 0)
          type: string
      required:
        - product_id
        - quantity
        - unit_cost
      type: object
    PoDTO:
      additionalProperties: false
      properties:
        code:
          type: string
        id:
          type: string
        lock_version:
          format: int32
          type: integer
        note:
          type: string
        status:
          description: draft|ordered|received|paid|cancelled
          type: string
        supplier_id:
          format: int64
          type: integer
        supplier_name:
          type: string
        total_amount:
          description: Tổng tiền hàng ex-VAT (chuỗi thập phân)
          type: string
        vat_amount:
          description: Tổng VAT đầu vào (chuỗi thập phân)
          type: string
      required:
        - id
        - code
        - status
        - total_amount
        - vat_amount
        - lock_version
      type: object
    PoDetailOutputBody:
      additionalProperties: false
      properties:
        lines:
          items:
            $ref: "#/components/schemas/PoLineDTO"
          type:
            - array
            - "null"
        purchase_order:
          $ref: "#/components/schemas/PoDTO"
      required:
        - purchase_order
        - lines
      type: object
    PoLineDTO:
      additionalProperties: false
      properties:
        batch_code:
          type: string
        expiry_date:
          description: YYYY-MM-DD
          type: string
        id:
          type: string
        line_no:
          format: int64
          type: integer
        line_total:
          description: Thành tiền dòng ex-VAT (chuỗi thập phân)
          type: string
        manufacturing_date:
          description: YYYY-MM-DD
          type: string
        product_id:
          format: int64
          type: integer
        quantity:
          description: Số lượng nhập (chuỗi thập phân)
          type: string
        unit_cost:
          description: Đơn giá nhập per-unit (chuỗi thập phân)
          type: string
        vat_rate:
          description: Thuế suất VAT dòng (vd "0.08")
          type: string
      required:
        - id
        - line_no
        - product_id
        - quantity
        - unit_cost
        - vat_rate
        - line_total
      type: object
    PoListOutputBody:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/PoDTO"
          type:
            - array
            - "null"
        next_cursor:
          description: Cursor trang kế; rỗng nếu hết
          type: string
      required:
        - items
      type: object
    PoPayInputBody:
      additionalProperties: false
      properties:
        amount:
          description: Số tiền chi (chuỗi thập phân, > 0)
          type: string
        bank_ref:
          description: Mã giao dịch ngân hàng (phiếu chi tự động, chống trùng)
          type: string
        book_type:
          description: Sổ ghi phiếu; bỏ trống = BOTH
          enum:
            - INTERNAL
            - TAX
            - BOTH
          type: string
        created_by:
          description: uuid người lập phiếu
          type: string
        fund_account_id:
          description: Quỹ/tài khoản XUẤT tiền
          format: int64
          minimum: 1
          type: integer
        fund_is_bank:
          description: true = ngân hàng (112); false = tiền mặt (111)
          type: boolean
      required:
        - amount
        - fund_account_id
      type: object
    PoPayOutputBody:
      additionalProperties: false
      properties:
        payment:
          $ref: "#/components/schemas/PoPaymentDTO"
        purchase_order:
          $ref: "#/components/schemas/PoDTO"
      required:
        - payment
        - purchase_order
      type: object
    PoPaymentDTO:
      additionalProperties: false
      properties:
        amount:
          description: Số tiền chi (chuỗi thập phân)
          type: string
        book_type:
          description: INTERNAL|TAX|BOTH
          type: string
        code:
          type: string
        flow:
          description: "'out' (phiếu chi)"
          type: string
        id:
          format: int64
          type: integer
        status:
          description: pending|completed
          type: string
      required:
        - id
        - code
        - amount
        - flow
        - status
        - book_type
      type: object
    PoReceiveInputBody:
      additionalProperties: false
      properties:
        has_invoice:
          description: true = có HĐ VAT mua → post thêm sổ TAX
          type: boolean
        tax_inventory_cost:
          description: Giá vốn ex-VAT theo HĐ mua (chuỗi; bỏ trống = giá thực)
          type: string
        tax_vat_amount:
          description: VAT đầu vào theo HĐ mua (chuỗi; bỏ trống = VAT thực)
          type: string
        warehouse_id:
          description: Kho nhập hàng
          format: int64
          minimum: 1
          type: integer
      required:
        - warehouse_id
      type: object
    PoReceiveOutputBody:
      additionalProperties: false
      properties:
        created_batch:
          description: batchID các lô vừa tạo
          items:
            format: int64
            type: integer
          type:
            - array
            - "null"
        inventory_cost:
          description: Tổng giá vốn nhập ex-VAT (chuỗi)
          type: string
        purchase_order:
          $ref: "#/components/schemas/PoDTO"
        vat_amount:
          description: Tổng VAT đầu vào (chuỗi)
          type: string
      required:
        - purchase_order
        - created_batch
        - inventory_cost
        - vat_amount
      type: object
    PosSaleInputBody:
      additionalProperties: false
      properties:
        creator_id:
          description: Người bán (uuid)
          type: string
        customer_id:
          description: ID khách; bỏ trống nếu khách vãng lai
          format: int64
          type: integer
        customer_tax_code:
          description: MST (bắt buộc nếu issue_invoice)
          type: string
        fund_account_id:
          description: Quỹ thu tiền
          format: int64
          minimum: 1
          type: integer
        fund_is_bank:
          type: boolean
        issue_invoice:
          description: true = xuất HĐ VAT (cần MST + serial)
          type: boolean
        lines:
          description: Các dòng hàng (ít nhất 1)
          items:
            $ref: "#/components/schemas/CreateOrderLineDTO"
          minItems: 1
          type:
            - array
            - "null"
        mau_so:
          type: string
        note:
          type: string
        serial:
          type: string
        vat_lines:
          description: Theo THỨ TỰ dòng khi xuất HĐ
          items:
            $ref: "#/components/schemas/OrchVATLineDTO"
          type:
            - array
            - "null"
        warehouse_id:
          description: Kho xuất
          format: int64
          minimum: 1
          type: integer
      required:
        - lines
        - warehouse_id
        - fund_account_id
      type: object
    PosSaleOutputBody:
      additionalProperties: false
      properties:
        cogs:
          type: string
        consumed:
          items:
            $ref: "#/components/schemas/ConsumedBatchDTO"
          type:
            - array
            - "null"
        invoice:
          $ref: "#/components/schemas/InvoiceSummaryDTO"
          description: HĐ VAT nếu có xuất; null nếu không
        lines:
          items:
            $ref: "#/components/schemas/OrderLineDTO"
          type:
            - array
            - "null"
        order:
          $ref: "#/components/schemas/OrderDTO"
        payment:
          $ref: "#/components/schemas/FinancePaymentDTO"
      required:
        - order
        - lines
        - payment
        - consumed
        - cogs
      type: object
    ProductDTO:
      additionalProperties: false
      properties:
        actual_cost:
          description: Giá vốn thực tế (chuỗi thập phân)
          type: string
        barcode:
          type: string
        category_id:
          format: int64
          type:
            - integer
            - "null"
        category_name:
          type: string
        conversion_factor:
          format: int32
          type: integer
        id:
          format: int64
          type: integer
        images:
          items:
            type: string
          type:
            - array
            - "null"
        invoice_price:
          description: Giá hóa đơn VAT (chuỗi thập phân, không float)
          type: string
        manufacturer_id:
          format: int64
          type:
            - integer
            - "null"
        manufacturer_name:
          type: string
        name:
          type: string
        retail_unit:
          type: string
        sku:
          type: string
        status:
          type: string
        wholesale_unit:
          type: string
      required:
        - id
        - name
        - sku
        - barcode
        - status
        - category_id
        - manufacturer_id
        - category_name
        - manufacturer_name
        - invoice_price
        - actual_cost
        - wholesale_unit
        - retail_unit
        - conversion_factor
        - images
      type: object
    RecordPaymentInputBody:
      additionalProperties: false
      properties:
        amount:
          description: Số tiền thu (chuỗi thập phân, > 0)
          type: string
        bank_ref:
          description: Mã giao dịch ngân hàng (phiếu webhook, chống trùng)
          type: string
        book_type:
          description: Sổ ghi phiếu; bỏ trống = BOTH
          enum:
            - INTERNAL
            - TAX
            - BOTH
          type: string
        created_by:
          description: uuid người lập phiếu
          type: string
        fund_account_id:
          description: Quỹ/tài khoản nhận tiền
          format: int64
          minimum: 1
          type: integer
        fund_is_bank:
          description: true = ngân hàng (112); false = tiền mặt (111)
          type: boolean
      required:
        - amount
        - fund_account_id
      type: object
    RecordPaymentOutputBody:
      additionalProperties: false
      properties:
        order:
          $ref: "#/components/schemas/OrderDTO"
        payment:
          $ref: "#/components/schemas/FinancePaymentDTO"
        payment_status:
          description: unpaid|partial|paid (sau khi thu)
          type: string
      required:
        - payment
        - payment_status
        - order
      type: object
    RefreshInputBody:
      additionalProperties: false
      properties:
        refresh_token:
          description: Refresh token đang giữ
          minLength: 1
          type: string
      required:
        - refresh_token
      type: object
    ShipOrderInputBody:
      additionalProperties: false
      properties:
        customer_tax_code:
          description: MST khách (bắt buộc cho HĐ VAT B2B)
          type: string
        mau_so:
          description: Mẫu số HĐ (NĐ123)
          type: string
        serial:
          description: Ký hiệu HĐ (dải đăng ký với CQT)
          type: string
        vat_lines:
          description: Thuế suất/đơn giá HĐ theo THỨ TỰ dòng đơn; nên truyền đủ cho B2B
          items:
            $ref: "#/components/schemas/OrchVATLineDTO"
          type:
            - array
            - "null"
        warehouse_id:
          description: Kho xuất hàng
          format: int64
          minimum: 1
          type: integer
      required:
        - warehouse_id
        - customer_tax_code
        - serial
      type: object
    ShipOrderOutputBody:
      additionalProperties: false
      properties:
        cogs:
          description: Tổng giá vốn đã xuất (chuỗi thập phân)
          type: string
        consumed:
          items:
            $ref: "#/components/schemas/ConsumedBatchDTO"
          type:
            - array
            - "null"
        invoice:
          $ref: "#/components/schemas/InvoiceSummaryDTO"
        order:
          $ref: "#/components/schemas/OrderDTO"
      required:
        - order
        - invoice
        - consumed
        - cogs
      type: object
    StockDTO:
      additionalProperties: false
      properties:
        id:
          format: int64
          type: integer
        max_stock:
          format: int32
          type: integer
        min_stock:
          format: int32
          type: integer
        product_id:
          format: int64
          type: integer
        quantity:
          description: Số lượng tồn (chuỗi thập phân, không float)
          type: string
        shelf_location:
          type: string
        warehouse_id:
          format: int64
          type: integer
      required:
        - id
        - product_id
        - warehouse_id
        - quantity
        - min_stock
        - max_stock
        - shelf_location
      type: object
    TokensBody:
      additionalProperties: false
      properties:
        access_token:
          description: JWT truy cập (ES256, TTL ngắn)
          type: string
        expires_in:
          description: TTL access token (giây)
          format: int64
          type: integer
        refresh_token:
          description: Refresh token opaque (xoay vòng)
          type: string
        token_type:
          description: Loại token
          examples:
            - Bearer
          type: string
      required:
        - access_token
        - refresh_token
        - token_type
        - expires_in
      type: object
    UnitDTO:
      additionalProperties: false
      properties:
        barcode:
          type: string
        conversion_rate:
          format: int32
          type: integer
        id:
          format: int64
          type: integer
        is_base:
          type: boolean
        is_direct_sale:
          type: boolean
        price:
          type: string
        price_cost:
          type: string
        price_sell:
          type: string
        unit_name:
          type: string
        unit_type:
          type: string
      required:
        - id
        - unit_name
        - conversion_rate
        - barcode
        - is_base
        - is_direct_sale
        - unit_type
        - price_cost
        - price_sell
        - price
      type: object
    VatInvoiceDTO:
      additionalProperties: false
      properties:
        created_at:
          description: Thời điểm tạo (RFC3339)
          type: string
        customer_tax_code:
          description: MST khách hàng (bắt buộc)
          type: string
        id:
          type: string
        invoice_no:
          description: Số hoá đơn (gapless theo serial)
          format: int64
          type: integer
        issue_date:
          description: Ngày phát hành (YYYY-MM-DD)
          type: string
        order_code:
          description: = orders.code (mã đơn)
          type: string
        serial:
          description: Ký hiệu hoá đơn
          type: string
        status:
          description: draft | issued | cancelled
          type: string
        subtotal:
          description: Tổng tiền hàng trước thuế (chuỗi thập phân, không float)
          type: string
        total:
          description: Tổng thanh toán = subtotal + vat_amount
          type: string
        vat_amount:
          description: Tổng thuế GTGT (chuỗi thập phân)
          type: string
      required:
        - id
        - order_code
        - customer_tax_code
        - serial
        - invoice_no
        - issue_date
        - subtotal
        - vat_amount
        - total
        - status
        - created_at
      type: object
    VatInvoiceDetailDTO:
      additionalProperties: false
      properties:
        lines:
          items:
            $ref: "#/components/schemas/VatLineDTO"
          type:
            - array
            - "null"
      required:
        - lines
      type: object
    VatLineDTO:
      additionalProperties: false
      properties:
        description:
          type: string
        line_amount:
          description: Giá trị dòng trước thuế
          type: string
        line_no:
          format: int32
          type: integer
        line_vat:
          description: Thuế GTGT dòng (đã làm tròn về đồng)
          type: string
        product_id:
          format: int64
          type: integer
        quantity:
          description: Số lượng (chuỗi thập phân)
          type: string
        unit_price:
          description: Đơn giá hoá đơn (chuỗi thập phân)
          type: string
        vat_rate:
          description: Thuế suất dòng (vd 0.08)
          type: string
      required:
        - line_no
        - product_id
        - description
        - quantity
        - unit_price
        - vat_rate
        - line_amount
        - line_vat
      type: object
    WarehouseDTO:
      additionalProperties: false
      properties:
        address:
          type: string
        code:
          type: string
        company_id:
          type: string
        id:
          format: int64
          type: integer
        key:
          type: string
        manager:
          type: string
        name:
          type: string
        outlet_type:
          type: string
        phone:
          type: string
        status:
          type: string
        type:
          type: string
        unit:
          type: string
      required:
        - id
        - key
        - name
        - unit
        - address
        - type
        - code
        - manager
        - phone
        - status
        - company_id
        - outlet_type
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      description: "Access JWT (ES256) — header: Authorization: Bearer <token>"
      scheme: bearer
      type: http
info:
  title: Nam Viet Backend API
  version: 1.0.0
openapi: 3.1.0
paths:
  /v1/_demo/echo:
    post:
      operationId: demo-echo
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EchoInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EchoOutputBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeError"
          description: Error
      summary: Demo validation 422 + success envelope
      tags:
        - _demo
  /v1/_demo/not-found:
    get:
      operationId: demo-not-found
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeError"
          description: Error
      summary: Demo lỗi 404 envelope
      tags:
        - _demo
  /v1/accounting/entries:
    get:
      operationId: accounting-list-entries
      parameters:
        - description: Con trỏ trang (opaque); rỗng = trang đầu
          explode: false
          in: query
          name: cursor
          schema:
            description: Con trỏ trang (opaque); rỗng = trang đầu
            type: string
        - description: Số bút toán mỗi trang (mặc định 50)
          explode: false
          in: query
          name: limit
          schema:
            description: Số bút toán mỗi trang (mặc định 50)
            format: int32
            maximum: 200
            minimum: 1
            type: integer
        - description: Lọc theo sổ; rỗng = cả hai
          explode: false
          in: query
          name: book
          schema:
            description: Lọc theo sổ; rỗng = cả hai
            enum:
              - INTERNAL
              - TAX
            type: string
        - description: Lọc theo kỳ kế toán (uuid); rỗng = mọi kỳ
          explode: false
          in: query
          name: period_id
          schema:
            description: Lọc theo kỳ kế toán (uuid); rỗng = mọi kỳ
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEntriesOutputBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeError"
          description: Error
      security:
        - bearerAuth: []
      summary: Danh sách bút toán sổ kế toán (keyset pagination)
      tags:
        - accounting
  /v1/accounting/entries/{id}:
    get:
      operationId: accounting-get-entry
      parameters:
        - description: ID bút toán (uuid)
          in: path
          name: id
          required: true
          schema:
            description: ID bút toán (uuid)
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntryDetailDTO"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeError"
          description: Error
      security:
        - bearerAuth: []
      summary: Chi tiết một bút toán kèm các dòng nợ/có
      tags:
        - accounting
  /v1/auth/login:
    post:
      operationId: auth-login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokensBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeError"
          description: Error
      summary: Đăng nhập bằng email + mật khẩu
      tags:
        - auth
  /v1/auth/logout:
    post:
      operationId: auth-logout
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutOutputBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeError"
          description: Error
      summary: Đăng xuất (thu hồi cả family refresh token)
      tags:
        - auth
  /v1/auth/me:
    get:
      operationId: auth-me
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeOutputBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeError"
          description: Error
      security:
        - bearerAuth: []
      summary: Thông tin + quyền của user hiện tại
      tags:
        - auth
  /v1/auth/refresh:
    post:
      operationId: auth-refresh
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokensBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeError"
          description: Error
      summary: Xoay vòng refresh token (phát access + refresh mới)
      tags:
        - auth
  /v1/categories:
    get:
      operationId: catalog-list-categories
      parameters:
        - description: Lọc trạng thái; rỗng = tất cả
          explode: false
          in: query
          name: status
          schema:
            description: Lọc trạng thái; rỗng = tất cả
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCategoriesOutputBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeError"
          description: Error
